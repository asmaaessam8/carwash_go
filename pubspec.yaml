name: carwash_go
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  cupertino_icons: ^1.0.8
  lottie: ^2.7.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.0.0
  google_sign_in: ^6.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/welcome_car.png
    - assets/images/logo.png
    - assets/animations/car_wash.json
    - assets/images/package_6.png
    - assets/images/package_12.jpeg
    - assets/images/service_wash.jpeg
    - assets/images/service_interior.jpeg
    - assets/images/service_cleaning.jpeg
    - assets/images/service_addons.jpeg
  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Regular.ttf